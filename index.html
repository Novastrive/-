<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASTRIVE</title>
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        @font-face {
            font-family: 'Undertale';
            src: url('undertale-deltarune-text-font-extended.ttf');
        }

        img {
            margin-top: 30px;
            width: 300px;
            image-rendering: pixelated;
        }

        .description {
            margin-top: 20px;
            color: white;
            font-family: 'Undertale', sans-serif;
            font-size: 24px;
            text-align: center;
            max-width: 900px;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <img src="logo_4x.png" alt="Logo">

    <div class="description">
        NOVASTRIVE, created by first time developers is a Sci-Fi Indie RPG game about the Milky Way galaxy's inevitable collision with the Andromeda galaxy.
    </div>

</body>
</html>
