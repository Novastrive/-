<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASTRIVE</title>
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        @font-face {
            font-family: 'Undertale';
            src: url('undertale-deltarune-text-font-extended.ttf');
        }

        img {
            margin-top: 30px;
            width: 300px;
            image-rendering: pixelated;
        }

        .description {
            margin-top: 20px;
            color: white;
            font-family: 'Undertale', sans-serif;
            font-size: 24px;
            text-align: center;
            max-width: 900px;
            padding: 0 20px;
        }

        .steam-button {
            margin-top: 30px;
            width: 260px;
            animation: float 2s ease-in-out infinite;
            transition: transform 0.2s ease;
        }

        .steam-button:hover {
            transform: scale(1.05);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="A Warning.mp3" type="audio/mpeg">
    </audio>

    <img src="logo_4x.png" alt="Logo" id="logo">

    <div class="description">
        NOVASTRIVE, created by first time developers is a Sci-Fi Indie RPG game about the Milky Way galaxy's inevitable collision with the Andromeda galaxy. Press Logo to toggle song
    </div>

    <a href="https://store.steampowered.com/app/4420170/Novastrive/" target="_blank">
        <img src="Steam_Button.png" alt="Steam Button" class="steam-button">
    </a>


    <script>
        const logo = document.getElementById('logo');
        const music = document.getElementById('bg-music');

        let playing = false;

        logo.addEventListener('click', () => {
            if (playing) {
                music.pause();
            } else {
                music.play();
            }

            playing = !playing;
        });
    </script>

</body>
</html>
